<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ALGERIAN SHOP .DZ</title>
    <script src="https://sdk.minepi.com/pi-sdk.js"></script>
    <style>
        body { font-family: sans-serif; background-color: #f4f4f4; text-align: center; padding: 20px; }
        .header { background-color: #006633; color: white; padding: 15px; border-radius: 10px; margin-bottom: 20px; }
        .btn-auth { background-color: #6c5ce7; color: white; border: none; padding: 15px 30px; border-radius: 25px; cursor: pointer; font-size: 1.1rem; }
        .product-card { background: white; border-radius: 10px; padding: 15px; margin: 20px auto; width: 280px; box-shadow: 0 4px 6px rgba(0,0,0,0.1); }
        .btn-buy { background-color: #e67e22; color: white; border: none; padding: 10px; border-radius: 5px; width: 100%; font-weight: bold; }
    </style>
</head>
<body>

    <div class="header">
        <h1>🇩🇿 متجر الجزائر .DZ 🇩🇿</h1>
    </div>

    <button id="auth-btn" class="btn-auth" onclick="handleLogin()">تسجيل الدخول عبر Pi</button>

    <div class="product-card">
        <h3>Samsung S24 Ultra</h3>
        <p>السعر: 150 Pi</p>
        <button class="btn-buy" onclick="handlePayment(150, 'Samsung S24')">شراء الآن</button>
    </div>

    <script>
        const Pi = window.Pi;
        Pi.init({ version: "2.0", sandbox: true });

        async function handleLogin() {
            alert("الزر يعمل برمجياً! جاري الاتصال بـ Pi SDK...");
            try {
                const scopes = ['username', 'payments'];
                const user = await Pi.authenticate(scopes, function(onIncomplete) {});
                document.getElementById('auth-btn').innerText = "مرحباً: " + user.user.username;
                alert("تم تسجيل الدخول بنجاح!");
            } catch (err) {
                alert("خطأ: تأكد من تفعيل Developer Mode في المحفظة.");
            }
        }

        async function handlePayment(amount, item) {
            try {
                await Pi.createPayment({
                    amount: amount,
                    memo: "شراء " + item,
                    metadata: { productName: item },
                }, {
                    onReadyForServerApproval: (id) => alert("بانتظار الموافقة..."),
                    onReadyForServerCompletion: (id, tx) => alert("تم الدفع بنجاح!"),
                    onCancel: (id) => alert("تم الإلغاء"),
                    onError: (e, p) => alert("خطأ في الدفع"),
                });
            } catch (err) {
                alert("يرجى تسجيل الدخول أولاً");
            }
        }
    </script>
</body>
</html>
