<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ALGERIAN SHOP .DZ</title>
    <script src="https://sdk.minepi.com/pi-sdk.js"></script>
    <style>
        body { font-family: sans-serif; background-color: #f4f4f4; text-align: center; padding: 20px; }
        .header { background-color: #006633; color: white; padding: 15px; border-radius: 10px; margin-bottom: 20px; }
        .product-card { background: white; border-radius: 10px; padding: 15px; margin: 10px; box-shadow: 0 2px 5px rgba(0,0,0,0.1); display: inline-block; width: 250px; }
        .product-img { width: 100%; height: 150px; border-radius: 5px; object-fit: cover; background-color: #ddd; }
        .btn-auth { background-color: #6c5ce7; color: white; border: none; padding: 12px 25px; border-radius: 20px; cursor: pointer; }
        .btn-buy { background-color: #e67e22; color: white; border: none; padding: 10px; border-radius: 5px; cursor: pointer; width: 100%; margin-top: 10px; }
    </style>
</head>
<body>

    <div class="header">
        <h1>🇩🇿 متجر الجزائر .DZ 🇩🇿</h1>
    </div>

    <button id="auth-btn" class="btn-auth" onclick="login()">تسجيل الدخول عبر Pi</button>

    <div id="products-container">
        <div class="product-card">
            <img src="https://m.media-amazon.com/images/I/71JLmhu21IL._AC_SL1500_.jpg" class="product-img">
            <h3>Samsung S24 Ultra</h3>
            <p>السعر: 150 Pi</p>
            <button class="btn-buy" onclick="pay(150, 'Samsung S24')">شراء الآن</button>
        </div>
    </div>

    <script>
        const Pi = window.Pi;
        Pi.init({ version: "2.0", sandbox: true });

        async function login() {
            try {
                const scopes = ['username', 'payments'];
                const user = await Pi.authenticate(scopes, function(payment) {
                    console.log("Incomplete payment found", payment);
                });
                document.getElementById('auth-btn').innerText = "مرحباً: " + user.user.username;
                alert("تم تسجيل الدخول بنجاح!");
            } catch (err) {
                alert("خطأ: يرجى فتح الموقع من داخل Pi Browser");
            }
        }

        async function pay(amount, item) {
            try {
                const payment = await Pi.createPayment({
                    amount: amount,
                    memo: "شراء " + item + " من متجر الجزائر",
                    metadata: { productName: item },
                }, {
                    onReadyForServerApproval: function(paymentId) { alert("الطلب قيد الانتظار: " + paymentId); },
                    onReadyForServerCompletion: function(paymentId, txid) { alert("تم الدفع بنجاح! شكراً لك."); },
                    onCancel: function(paymentId) { alert("تم إلغاء العملية"); },
                    onError: function(error, payment) { alert("حدث خطأ أثناء الدفع"); },
                });
            } catch (err) {
                alert("يرجى تسجيل الدخول أولاً");
            }
        }
    </script>
</body>
</html>
