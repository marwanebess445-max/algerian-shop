
<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ALGERIAN SHOP .DZ</title>
    <script src="https://sdk.minepi.com/pi-sdk.js"></script>
    <style>
        body { font-family: sans-serif; background-color: #f4f4f4; text-align: center; padding: 20px; }
        .header { background-color: #006633; color: white; padding: 15px; border-radius: 10px; }
        .btn-auth { background-color: #6c5ce7; color: white; border: none; padding: 15px 30px; border-radius: 25px; cursor: pointer; font-size: 1.1rem; margin: 20px 0; }
        .product-card { background: white; border-radius: 10px; padding: 15px; margin: 10px; box-shadow: 0 2px 5px rgba(0,0,0,0.1); display: inline-block; width: 250px; }
        .product-img { width: 100%; height: 150px; border-radius: 5px; object-fit: cover; }
    </style>
</head>
<body>

    <div class="header">
        <h1>🇩🇿 متجر الجزائر .DZ 🇩🇿</h1>
    </div>

    <button id="auth-btn" class="btn-auth" onclick="login()">تسجيل الدخول عبر Pi</button>

    <div id="products">
        <div class="product-card">
            <img src="https://m.media-amazon.com/images/I/71JLmhu21IL._AC_SL1500_.jpg" class="product-img">
            <h3>Samsung S24 Ultra</h3>
            <p>150 Pi</p>
        </div>
    </div>

    <script>
        // 1. تعريف Pi
        const Pi = window.Pi;

        // 2. تشغيل الـ SDK (تأكد أن sandbox: true للاختبار)
        try {
            Pi.init({ version: "2.0", sandbox: true });
            console.log("Pi SDK initialized");
        } catch (e) {
            console.error("SDK Init error:", e);
        }

        // 3. دالة تسجيل الدخول
        async function login() {
            alert("تم الضغط على الزر! جاري الاتصال بـ Pi..."); // رسالة للتأكد أن الزر يعمل
            
            try {
                const scopes = ['username', 'payments'];
                
                // دالة التعامل مع المدفوعات الناقصة
                function onIncompletePaymentFound(payment) {
                    console.log("Incomplete payment:", payment);
                };

                // طلب التصريح من المستخدم
                const user = await Pi.authenticate(scopes, onIncompletePaymentFound);
                
                alert("أهلاً بك يا " + user.user.username); // رسالة نجاح
                document.getElementById('auth-btn').innerText = "مرحباً: " + user.user.username;
                document.getElementById('auth-btn').style.backgroundColor = "#2ecc71";

            } catch (err) {
                alert("خطأ في الاتصال: " + err.message);
                console.error(err);
            }
        }
    </script>
</body>
</html>
