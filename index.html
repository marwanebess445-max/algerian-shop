<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="pi-verification" content="f69431876f183e8b4cb465597b0a70f808f972049d115e6129841c9b3624e138">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ALGERIAN SHOP .DZ</title>
    <script src="https://sdk.minepi.com/pi-sdk.js"></script>
    <style>
        body { font-family: sans-serif; background-color: #f4f4f4; text-align: center; padding: 20px; }
        .header { background-color: #006633; color: white; padding: 15px; border-radius: 10px; margin-bottom: 20px; }
        .btn-auth { background-color: #6c5ce7; color: white; border: none; padding: 12px 25px; border-radius: 25px; cursor: pointer; font-size: 16px; }
        .product-card { background: white; border-radius: 10px; padding: 15px; margin-top: 20px; box-shadow: 0 4px 6px rgba(0,0,0,0.1); }
        .btn-buy { background-color: #e67e22; color: white; border: none; padding: 10px 20px; border-radius: 5px; cursor: pointer; margin-top: 10px; }
    </style>
</head>
<body>

    <div class="header">
        <h1>🇩🇿 متجر الجزائر .DZ 🇩🇿</h1>
    </div>

    <button id="auth-btn" class="btn-auth" onclick="handleLogin()">تسجيل الدخول عبر Pi</button>

    <div class="product-card">
        <h3>Samsung S24 Ultra</h3>
        <p>السعر: 150 Pi</p>
        <button class="btn-buy" onclick="handlePayment(150, 'Samsung S24 Ultra')">شراء الآن</button>
    </div>

    <script>
        const Pi = window.Pi;
        // تم ضبط sandbox على false للعمل داخل متصفح Pi الرسمي
        Pi.init({ version: "2.0", sandbox: false });

        async function handleLogin() {
            try {
                const scopes = ['username', 'payments'];
                const user = await Pi.authenticate(scopes, function(onIncompletePaymentFound(payment) {
                    // معالجة المدفوعات غير المكتملة هنا
                });
                
                document.getElementById('auth-btn').innerText = "مرحباً: " + user.user.username;
                alert("تم تسجيل الدخول بنجاح يا " + user.user.username);
            } catch (err) {
                console.error(err);
                alert("خطأ: تأكد من فتح الموقع من داخل متصفح Pi وتفعيل Developer Mode في المحفظة.");
            }
        }

        async function handlePayment(amount, itemName) {
            try {
                const payment = await Pi.createPayment({
                    amount: amount,
                    memo: "شراء " + itemName,
                    metadata: { productName: itemName },
                }, {
                    onReadyForServerApproval: function(paymentId) {
                        console.log("Payment ID ready for approval:", paymentId);
                        // هنا يتم إرسال المعرف لخادمك للتأكيد
                    },
                    onReadyForServerCompletion: function(paymentId, txid) {
                        console.log("Payment ready for completion:", txid);
                        alert("شكراً لك! تم استلام طلبك بنجاح.");
                    },
                    onCancel: function(paymentId) { console.log("Payment cancelled"); },
                    onError: function(error, payment) { console.error("Payment error", error); },
                });
            } catch (err) {
                alert("يجب تسجيل الدخول أولاً قبل الشراء.");
            }
        }
    </script>
</body>
</html>
