<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ALGERIAN SHOP .DZ</title>
    <script src="https://sdk.minepi.com/pi-sdk.js"></script>
    <style>
        body { font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; background-color: #f4f4f4; margin: 0; padding: 20px; text-align: center; }
        .header { background-color: #006633; color: white; padding: 20px; border-radius: 15px; margin-bottom: 30px; box-shadow: 0 4px 10px rgba(0,0,0,0.2); }
        .container { display: flex; flex-wrap: wrap; justify-content: center; gap: 25px; }
        .product-card { background: white; border-radius: 15px; box-shadow: 0 6px 12px rgba(0,0,0,0.1); width: 280px; padding: 15px; transition: 0.3s; border-bottom: 5px solid #d21034; }
        .product-card:hover { transform: translateY(-8px); }
        .product-img { width: 100%; height: 200px; border-radius: 10px; object-fit: cover; margin-bottom: 15px; }
        .price { color: #d21034; font-size: 1.4rem; font-weight: bold; margin: 10px 0; }
        .btn-buy { background-color: #e67e22; color: white; border: none; padding: 12px; border-radius: 8px; cursor: pointer; width: 100%; font-size: 1.1rem; font-weight: bold; }
        .btn-auth { background-color: #6c5ce7; color: white; border: none; padding: 12px 40px; border-radius: 30px; cursor: pointer; font-size: 1.2rem; margin-bottom: 30px; box-shadow: 0 4px 10px rgba(108, 92, 231, 0.3); }
    </style>
</head>
<body>

    <div class="header">
        <h1>🇩🇿 متجر الجزائر .DZ 🇩🇿</h1>
        <p>التسوق في الجزائر أصبح أسهل مع عملة Pi</p>
    </div>

    <button id="auth-btn" class="btn-auth" onclick="auth()">تسجيل الدخول عبر Pi</button>

    <div class="container">
        <div class="product-card">
            <img src="https://m.media-amazon.com/images/I/71JLmhu21IL._AC_SL1500_.jpg" class="product-img" alt="Samsung S24">
            <h3>هاتف Samsung S24 Ultra</h3>
            <p class="price">150 Pi</p>
            <button class="btn-buy" onclick="createPayment(150, 'Samsung S24 Ultra')">شراء الآن</button>
        </div>

        <div class="product-card">
            <img src="https://m.media-amazon.com/images/I/710p-vS6qLL._AC_SL1500_.jpg" class="product-img" alt="Laptop HP">
            <h3>حاسوب HP Pavilion</h3>
            <p class="price">320 Pi</p>
            <button class="btn-buy" onclick="createPayment(320, 'Laptop HP Pavilion')">شراء الآن</button>
        </div>

        <div class="product-card">
            <img src="https://m.media-amazon.com/images/I/71Y8SndnS1L._AC_SL1500_.jpg" class="product-img" alt="Apple Watch">
            <h3>Apple Watch Series 9</h3>
            <p class="price">75 Pi</p>
            <button class="btn-buy" onclick="createPayment(75, 'Apple Watch S9')">شراء الآن</button>
        </div>
    </div>

    <script>
        const Pi = window.Pi;
        Pi.init({ version: "2.0", sandbox: true });

        async function auth() {
            try {
                const scopes = ['username', 'payments'];
                const user = await Pi.authenticate(scopes, onIncompletePaymentFound);
                document.getElementById('auth-btn').innerText = "أهلاً بك: " + user.user.username;
                console.log("تم تسجيل الدخول بنجاح");
            } catch (err) {
                alert("يرجى فتح المتجر من داخل Pi Browser");
            }
        }

        function onIncompletePaymentFound(payment) {
            console.log("هناك عملية دفع غير مكتملة:", payment);
        }

        async function createPayment(amount, memo) {
            alert("بدء عملية شراء " + memo + " بمبلغ " + amount + " Pi...\n(سيتم ربط البلوكشين في الخطوة القادمة)");
            // في المرحلة القادمة سنضيف كود Pi.createPayment الفعلي هنا
        }
    </script>
</body>
</html>
